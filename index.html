<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Private Tasks</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <h2>Tasks</h2>

        <nav>
          <button data-filter="all">Inbox</button>
          <button data-filter="today">Today</button>
          <button data-filter="completed">Completed</button>
        </nav>
      </aside>

      <main>
        <header>
          <input
            id="taskInput"
            placeholder="Add a task..."
            autocomplete="off"
          />
        </header>

        <ul id="taskList"></ul>
      </main>
    </div>

    <div id="lockScreen">
      <div class="unlock">
        <h2 id="lockTitle">Unlock Tasks</h2>

        <input
          type="password"
          id="passwordInput"
          placeholder="Enter passphrase"
        />

        <input
          type="password"
          id="passwordConfirm"
          placeholder="Confirm passphrase"
          style="display: none"
        />

        <button id="unlockBtn">Unlock</button>

        <p id="lockHint"></p>
      </div>
    </div>

    <script src="crypto.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
